spring.application.name=app-customers
server.port=${SERVER_PORT:8090}

# Conexion a la base
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/books}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# El pdf decia sin flyway asi que toca obedecer gg
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Consul
spring.cloud.consul.host=${CONSUL_HOST:127.0.0.1}
spring.cloud.consul.port=${CONSUL_PORT:8500}
spring.cloud.consul.discovery.hostname=${spring.cloud.client.ip-address}
spring.cloud.consul.discovery.service-name=app-customers
spring.cloud.consul.discovery.instance-id=${spring.application.name}-${spring.cloud.client.ip-address}:${server.port}
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s

# Tags pal traefik
spring.cloud.consul.discovery.tags=traefik.enable=true,traefik.http.routers.customers.rule=PathPrefix(`/app-customers`),traefik.http.middlewares.customers-stripprefix.stripprefix.prefixes=/app-customers,traefik.http.routers.customers.middlewares=customers-stripprefix

# Actuator
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=always
