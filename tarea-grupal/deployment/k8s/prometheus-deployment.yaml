apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: books-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: 'app-authors'
        scrape_interval: 10s
        metrics_path: /q/metrics
        static_configs:
          - targets: ['app-authors:8080']

      - job_name: 'app-books'
        scrape_interval: 10s
        metrics_path: /q/metrics
        static_configs:
          - targets: ['app-books:8080']

      - job_name: 'app-customers'
        scrape_interval: 10s
        metrics_path: /q/metrics
        static_configs:
          - targets: ['app-customers:8080']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: books-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: books-app
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9090
      targetPort: 9090
  selector:
    app: prometheus