apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: calechon-dev
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'app-authors'
        scrape_interval: 10s
        metrics_path: /q/metrics
        static_configs:
          - targets: ['app-authors:8080']

      - job_name: 'app-books'
        scrape_interval: 10s
        metrics_path: /q/metrics
        static_configs:
          - targets: ['app-books:8080']

      - job_name: 'app-customers'
        scrape_interval: 10s
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['app-customers:8080']