name: books-app

services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: books-db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d books-db"]
      interval: 5s
      timeout: 5s
      retries: 5

  consul:
    image: consul:1.15.0
    container_name: consul
    command: agent -dev -client=0.0.0.0 -ui
    ports:
      - "8500:8500"

  traefik:
    image: traefik:v3.1
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.consulCatalog=true"
      - "--providers.consulCatalog.endpoint.address=consul:8500"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    depends_on:
      - consul

  app-authors:
    build:
      context: ../../app-authors
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: app-authors
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/books-db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
    ports:
      - "8070:8080"
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_started

  app-books:
    build:
      context: ../../app-books
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: app-books
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/books-db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_started

  app-customers:
    build:
      context: ../../app-customers
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: app-customers
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/books-db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_started

  app-web:
    build:
      context: ../../app-web
      dockerfile: Dockerfile
    container_name: app-web
    ports:
      - "5173:80"
    depends_on:
      - traefik
