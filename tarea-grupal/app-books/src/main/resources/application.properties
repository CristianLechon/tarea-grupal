quarkus.datasource.db-kind=postgresql

#quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/books
#quarkus.datasource.username=postgres
#quarkus.datasource.password=7720

#ports
quarkus.http.port=8080
quarkus.http.host=0.0.0.0


#cors
quarkus.hibernate-orm.database.generation=update
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET, POST, PUT, DELETE, OPTIONS, HEAD

# Configurar el cliente REST para que use Stork con el nombre "authors-api"
quarkus.rest-client.authors-api.url=stork://authors-api

# Configurar Stork para que busque "authors-api" usando Consul
quarkus.stork.authors-api.service-discovery.type=consul
quarkus.stork.authors-api.service-discovery.consul-host=127.0.0.1
quarkus.stork.authors-api.service-discovery.consul-port=8500
# El nombre exacto con el que app-authors se registró en Consul
quarkus.stork.authors-api.service-discovery.name=app-authors